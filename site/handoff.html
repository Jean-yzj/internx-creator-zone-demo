<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工程交接文件｜InternX 創作者專區</title>
<link rel="icon" href="/favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
<link rel="stylesheet" href="/assets/app.css" />
<style>
  .doc { width: min(900px, 92vw); margin: 0 auto; padding: 28px 0 64px; }
  .doc h1 { font-size: 30px; color: #11243f; margin: 28px 0 14px; letter-spacing: -0.01em; }
  .doc h2 { font-size: 23px; color: #11243f; margin: 34px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--theme-white); }
  .doc h3 { font-size: 18px; color: #1861a8; margin: 24px 0 10px; border-left: 3px solid var(--theme-color); padding-left: 10px; }
  .doc p { line-height: 1.8; color: #2b2b2b; margin: 0 0 14px; }
  .doc ul, .doc ol { line-height: 1.8; color: #2b2b2b; margin: 0 0 16px; padding-left: 22px; }
  .doc li { margin-bottom: 6px; }
  .doc a { color: var(--link-color); }
  .doc code { background: #f0f3f7; color: #b4326b; padding: 2px 7px; border-radius: 5px; font-size: 0.9em; font-family: ui-monospace, monospace; }
  .doc pre { background: #0f1b2d; color: #e6edf3; padding: 16px 18px; border-radius: 10px; overflow-x: auto; line-height: 1.55; font-size: 13.5px; margin: 0 0 18px; }
  .doc pre code { background: none; color: inherit; padding: 0; }
  .doc blockquote { border-left: 3px solid var(--complementary-color); background: var(--complementary-white); margin: 18px 0; padding: 12px 16px; border-radius: 0 8px 8px 0; color: #6a5310; }
  .doc .tableWrap { overflow-x: auto; max-width: 100%; margin: 0 0 20px; -webkit-overflow-scrolling: touch; }
  .doc table { width: 100%; border-collapse: collapse; margin: 0; font-size: 14px; }
  .doc code { overflow-wrap: anywhere; word-break: break-word; }
  .doc th, .doc td { border: 1px solid #e2e8f0; padding: 9px 12px; text-align: left; vertical-align: top; }
  .doc th { background: var(--theme-white); color: #11243f; font-weight: 600; }
  .doc tr:nth-child(even) td { background: #fafbfc; }
  .doc hr { border: none; border-top: 1px solid #e5e5e5; margin: 30px 0; }
  .docToolbar { position: sticky; top: calc(var(--top-bar-height) + 8px); display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 6px; z-index: 5; }
  .archFig { margin: 6px 0 26px; padding: 18px; background: #fbfdff; border: 1px solid #e2ecf7; border-radius: 14px; text-align: center; }
  .archFig img { width: 100%; max-width: 760px; height: auto; display: block; margin: 0 auto; }
  .archFig figcaption { margin-top: 12px; font-size: 13px; color: #6a7686; line-height: 1.6; }
</style>
</head>
<body data-page="handoff">

<main>
  <section class="cz-hero" style="padding:36px 0 28px">
    <div class="cz-container">
      <span class="cz-eyebrow"><i class="ri-file-list-3-line"></i> 工程交接</span>
      <h1 style="font-size:calc(var(--font-size)/3.4);margin:10px 0 8px">創作者專區・串接規格文件</h1>
      <p style="margin:0">給工程師的完整串接說明：資料模型、路由、各功能如何接上既有系統。</p>
    </div>
  </section>

  <div class="doc">
    <div class="docToolbar">
      <a class="btn btn-white btn-small" href="/HANDOFF.md" download><i class="ri-download-line"></i> 下載 Markdown</a>
    </div>
    <figure class="archFig">
      <img src="/img/architecture.svg" alt="創作者專區整體架構圖：註冊與審核管線 → 標章授予 → 創作者主頁 → 部落格／活動／專長／社群／論壇心得各系統串接" />
      <figcaption>整體架構一覽：申請 → 審核 → <code>grantVerifiedBadgeToUser</code> 發標章 → 創作者主頁中樞 → 串接 6 大既有系統。金色虛線框為「待補」項目。</figcaption>
    </figure>
    <div id="docBody"><p class="muted">載入中⋯</p></div>
  </div>
</main>

<script src="/assets/data.js"></script>
<script src="/assets/render.js"></script>
<script src="/assets/app.js"></script>
<script>
  // 極簡 Markdown 渲染（支援標題/表格/程式碼/清單/引用/粗體/行內碼/連結/hr）
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function inline(s){
    return esc(s)
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  }
  function render(md){
    const lines = md.split("\n"); let html = ""; let i = 0;
    while (i < lines.length){
      let line = lines[i];
      // code fence
      if (line.trim().startsWith("```")){
        let code = ""; i++;
        while (i < lines.length && !lines[i].trim().startsWith("```")){ code += lines[i] + "\n"; i++; }
        i++; html += "<pre><code>" + esc(code.replace(/\n$/,"")) + "</code></pre>"; continue;
      }
      // table
      if (line.includes("|") && i+1 < lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i+1]) && lines[i+1].includes("-")){
        const head = line.split("|").filter(c=>c.trim()!=="").map(c=>"<th>"+inline(c.trim())+"</th>").join("");
        i += 2; let rows = "";
        while (i < lines.length && lines[i].includes("|")){
          const cells = lines[i].split("|").filter((c,idx,arr)=> !(idx===0&&c.trim()==="") && !(idx===arr.length-1&&c.trim()==="")).map(c=>"<td>"+inline(c.trim())+"</td>").join("");
          rows += "<tr>"+cells+"</tr>"; i++;
        }
        html += "<div class=\"tableWrap\"><table><thead><tr>"+head+"</tr></thead><tbody>"+rows+"</tbody></table></div>"; continue;
      }
      // headings
      let m;
      if ((m = line.match(/^(#{1,6})\s+(.*)/))){ const l = m[1].length; html += `<h${l}>${inline(m[2])}</h${l}>`; i++; continue; }
      // hr
      if (/^---+\s*$/.test(line)){ html += "<hr>"; i++; continue; }
      // blockquote
      if (line.startsWith(">")){ let q = ""; while (i<lines.length && lines[i].startsWith(">")){ q += lines[i].replace(/^>\s?/,"") + " "; i++; } html += "<blockquote>"+inline(q.trim())+"</blockquote>"; continue; }
      // unordered list (含 checkbox)
      if (/^\s*[-*]\s+/.test(line)){
        let items = "";
        while (i<lines.length && /^\s*[-*]\s+/.test(lines[i])){
          let t = lines[i].replace(/^\s*[-*]\s+/,"");
          t = t.replace(/^\[ \]\s*/,'☐ ').replace(/^\[x\]\s*/i,'☑ ');
          items += "<li>"+inline(t)+"</li>"; i++;
        }
        html += "<ul>"+items+"</ul>"; continue;
      }
      // ordered list
      if (/^\s*\d+\.\s+/.test(line)){
        let items = "";
        while (i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ items += "<li>"+inline(lines[i].replace(/^\s*\d+\.\s+/,""))+"</li>"; i++; }
        html += "<ol>"+items+"</ol>"; continue;
      }
      // blank
      if (line.trim()===""){ i++; continue; }
      // paragraph
      html += "<p>"+inline(line)+"</p>"; i++;
    }
    return html;
  }
  fetch("/HANDOFF.md").then(r=>r.text()).then(md=>{
    document.getElementById("docBody").innerHTML = render(md);
  }).catch(()=>{ document.getElementById("docBody").innerHTML = '<p class="muted">無法載入文件，請改用「下載 Markdown」。</p>'; });
</script>
</body>
</html>
